<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>可滑動式 X 光圖鑑（手機版）</title>
  <style>
    :root{
      --bg:#0b0f19; --card:#11182a; --ink:#eaf1ff; --soft:#93a4d6; --acc:#4c7dff;
      --radius:16px; --pad:14px; --badge:#0e1c3f;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font-family: system-ui,-apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif; background:var(--bg); color:var(--ink)}

    /* Header */
    header{position:sticky; top:0; z-index:5; backdrop-filter: blur(10px); background:linear-gradient(180deg, rgba(5,8,15,.9), rgba(5,8,15,.65)); border-bottom:1px solid rgba(255,255,255,.06)}
    .h-wrap{max-width:980px; margin:0 auto; padding:10px 14px; display:flex; align-items:center; gap:10px}
    .title{font-weight:800; letter-spacing:.02em}
    .muted{color:var(--soft); font-size:13px}
    .back-btn{
    appearance:none;
    border:1px solid #273a7a;
    background:#111b3b;
    color:#cfe0ff;
    border-radius:10px;
    padding:6px 10px;
    font-weight:800;
    cursor:pointer;
    }
    .back-btn:active{
    transform: scale(.96);
    }


    /* Carousel */
    .outer{max-width:980px; margin:0 auto; padding:10px 0 24px}
    .rail{display:flex; gap:14px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; padding: 8px 14px 10px}
    .rail::-webkit-scrollbar{height:8px}
    .rail::-webkit-scrollbar-thumb{background:#1f2a46; border-radius:10px}

    .card{scroll-snap-align:center; position:relative; background:var(--card); border:1px solid rgba(255,255,255,.06); border-radius:var(--radius); min-width:88vw; max-width:88vw}
    @media (min-width:720px){.card{min-width:520px; max-width:520px}}

    .fig{position:relative; border-bottom:1px solid rgba(255,255,255,.06)}
    .fig img{display:block; border-radius: 12px; width:100%; height:64vh; object-fit:contain; background:#0a1228}

    .meta{display:flex; align-items:center; justify-content:space-between; padding:10px var(--pad)}
    .badges{display:flex; align-items:center; gap:6px}
    .badge{font-weight:800; font-size:12px;  overflow: hidden;color:#cfe0ff; background:var(--badge); border:1px solid #1b2b57; padding:6px 9px; border-radius:9999px}
    .name{font-weight:700}
    .note{color:var(--soft); font-size:13px}

    .help{padding:0 14px 14px; color:#9db0e8; font-size:13px}
    .help b{color:#cfe0ff}

    /* Lightbox / bottom-sheet */
    .sheet{position:fixed; inset:0; display:none; place-items:end center; z-index:20;}
    .sheet.active{display:grid}
    .sheet .overlay{position:absolute; inset:0; background:rgba(0,0,0,.6)}
    .panel{position:relative; width:100%; max-width:980px; background:#0d1428; border-radius:18px 18px 0 0; border:1px solid rgba(255,255,255,.08); transform:translateY(0)}
    .panel header{position:sticky; top:0; display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#0d1428; border-bottom:1px solid rgba(255,255,255,.06)}
    .panel header .ttl{font-weight:800}
    .close{appearance:none; background:#152045; border:1px solid #273a7a; color:#cfe0ff; border-radius:10px; padding:6px 10px}

    .tabs{display:flex; gap:8px; padding:10px 14px}
    .tabs button{flex:1; appearance:none; padding:10px; border-radius:10px; border:1px solid #2a3f7f; background:#111b3b; color:#d7e3ff; font-weight:700}
    .tabs button.active{background:#2a49ff; border-color:#365bff; color:white}

    .tabview{padding:6px 14px 18px}
    .tabview .pic{display:none}
    .tabview .pic.active{display:block}
    .tabview img{width:100%; height:56vh; object-fit:contain;border-radius: 12px; overflow: hidden;background:#0a1228}

    .cap{margin-top:6px; font-size:13px; color:#a8b9ed}

    .center{display:flex; align-items:center; gap:10px}
  </style>
</head>

    // === 生成卡片 ===
    const rail = document.getElementById('rail');
    function makeCard(item, idx){
      const no = idx + 1;
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <figure class="fig">
          <img loading="lazy" src="${item.xrayUrl}" alt="NO.${no} ${item.title} X 光圖"/>
        </figure>
        <div class="meta">
          <div class="badges"><div class="badge">NO.${no}</div></div>
          <div class="name">${item.title || ''}</div>
        </div>
        <div class="help" style="padding-top:0">${item.note ? item.note : '點一下圖片開啟面板'}</div>
      `;
      // 點圖開啟底部面板
      card.querySelector('img').addEventListener('click', ()=> openSheet(no, item));
      return card;
    }
    DATA.forEach((it, i)=> rail.appendChild(makeCard(it, i)));

    // === 目前頁數指示 ===
    const status = document.getElementById('status');
    const obs = new IntersectionObserver((ents)=>{
      ents.filter(e=>e.isIntersecting).forEach(e=>{
        const i = [...rail.children].indexOf(e.target) + 1;
        status.textContent = `第 ${i} / ${rail.children.length} 張`;
      });
    }, {root: rail, threshold: .6});
    [...rail.children].forEach(el=> obs.observe(el));

    // === Bottom sheet 控制 ===
    const sheet = document.getElementById('sheet');
    const sheetNo = document.getElementById('sheetNo');
    const sheetTitle = document.getElementById('sheetTitle');
    const imgSide = document.getElementById('imgSide');
    const imgReal = document.getElementById('imgReal');
    const capSide = document.getElementById('capSide');
    const capReal = document.getElementById('capReal');

    function openSheet(no, item){
      sheetNo.textContent = `NO.${no}`;
      sheetTitle.textContent = item.title || '';
      imgSide.src = item.sideUrl || '';
      imgReal.src = item.realUrl || '';
      capSide.textContent = item.sideUrl ? '標示圖' : '（未提供側面圖）';
      capReal.textContent = item.realUrl ? '實物圖' : '（未提供實物圖）';
      sheet.classList.add('active');
      setTab('side');
    }
    function closeSheet(){ sheet.classList.remove('active'); }
    document.querySelectorAll('[data-close]').forEach(el=> el.addEventListener('click', closeSheet));
    window.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

    // tabs
    const tabSide = document.getElementById('tabSide');
    const tabReal = document.getElementById('tabReal');
    const viewSide = document.getElementById('viewSide');
    const viewReal = document.getElementById('viewReal');

    function setTab(which){
      const side = which === 'side';
      tabSide.classList.toggle('active', side);
      tabReal.classList.toggle('active', !side);
      viewSide.classList.toggle('active', side);
      viewReal.classList.toggle('active', !side);
    }
    tabSide.addEventListener('click', ()=> setTab('side'));
    tabReal.addEventListener('click', ()=> setTab('real'));

    // 初始狀態
    status.textContent = `共 ${DATA.length} 張，向左右滑動瀏覽`;
  </script>
